<meta charset="UTF-8">
<title>Diamond Price 3D — Your Stone vs Market</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#controls-panel {
  position: absolute; top: 0; left: 0; width: 280px; height: 100vh;
  background: rgba(13,17,23,0.97); border-right: 1px solid #30363d;
  padding: 16px; overflow-y: auto; z-index: 100;
}
#controls-panel h2 { color: #f0f6fc; font-size: 15px; margin-bottom: 12px; }
.input-group { margin-bottom: 14px; }
.input-group label { display: block; color: #8b949e; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.input-group select, .input-group input {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d;
  background: #161b22; color: #f0f6fc; font-size: 14px; font-weight: 600;
}
.input-group select:focus, .input-group input:focus { border-color: #58a6ff; outline: none; }
#result-panel {
  margin-top: 16px; padding: 12px; background: #161b22; border-radius: 8px; border: 1px solid #30363d;
}
#result-panel .label { color: #8b949e; font-size: 10px; text-transform: uppercase; }
#result-panel .value { color: #58a6ff; font-size: 22px; font-weight: 700; margin: 4px 0; }
#result-panel .diff { font-size: 12px; margin-top: 4px; }
.diff-below { color: #3fb950; }
.diff-above { color: #f85149; }
.diff-fair { color: #d29922; }
#your-stone-badge {
  display: inline-block; background: #da3633; color: #fff; font-size: 10px;
  padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-top: 8px;
}
#legend-panel {
  position: absolute; bottom: 12px; left: 292px; color: #8b949e; font-size: 10px;
  background: rgba(13,17,23,0.85); padding: 10px 14px; border-radius: 8px; border: 1px solid #30363d; z-index: 10;
}
#legend-panel .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
#legend-panel .dot { width: 8px; height: 8px; border-radius: 50%; }
#tooltip {
  position: absolute; display: none; background: rgba(22,27,34,0.95); border: 1px solid #30363d;
  border-radius: 8px; padding: 10px 14px; color: #f0f6fc; font-size: 12px;
  pointer-events: none; z-index: 200; backdrop-filter: blur(8px);
}
#tooltip .price { font-size: 16px; font-weight: 700; color: #58a6ff; }
#canvas-container { position: absolute; top: 0; left: 280px; right: 0; bottom: 0; }
#instructions { position: absolute; top: 12px; right: 16px; color: #484f58; font-size: 10px; z-index: 10; }
#mobile-result {
  display: none; position: absolute; top: 0; left: 0; right: 0;
  background: rgba(13,17,23,0.92); border-bottom: 1px solid #30363d;
  padding: 10px 14px; color: #f0f6fc; font-size: 13px; font-weight: 600;
  z-index: 50; text-align: center; backdrop-filter: blur(6px);
}
#mobile-result .diff-below { color: #3fb950; }
#mobile-result .diff-above { color: #f85149; }
#mobile-result .diff-fair { color: #d29922; }
@media (max-width: 600px) {
  body { overflow: auto; }
  #controls-panel {
    position: relative; width: 100%; height: auto;
    border-right: none; border-bottom: 1px solid #30363d;
  }
  #canvas-container {
    position: relative; left: 0; width: 100%; height: 60vh;
  }
  #mobile-result { position: sticky; top: 0; }
  #legend-panel { left: 8px; bottom: auto; top: 8px; font-size: 9px; padding: 6px 10px; }
  #instructions { top: auto; bottom: 8px; right: 8px; left: auto; }
  .input-group { display: inline-block; width: 48%; margin-right: 2%; margin-bottom: 8px; }
  .input-group:nth-child(1) { width: 100%; }
  #result-panel { margin-top: 8px; }
  #tooltip { display: none !important; }
}
</style>

<body>

<div id="controls-panel">
  <h2>💎 Your Stone</h2>
  <div class="input-group">
    <label>Price (USD)</label>
    <input type="number" id="inp-price" placeholder="e.g. 18000" step="100">
  </div>
  <div class="input-group">
    <label>Carat</label>
    <input type="number" id="inp-carat" placeholder="e.g. 2.01" step="0.01" min="1.5" max="3">
  </div>
  <div class="input-group">
    <label>Colour</label>
    <select id="inp-colour"><option value="">— Select —</option><option>H</option><option>G</option><option>F</option><option>E</option></select>
  </div>
  <div class="input-group">
    <label>Clarity</label>
    <select id="inp-clarity"><option value="">— Select —</option><option>VS2</option><option>VS1</option><option>VVS2</option><option>VVS1</option></select>
  </div>
  <div class="input-group">
    <label>Cut</label>
    <select id="inp-cut"><option value="">— Select —</option><option>Excellent</option><option>Very Good</option></select>
  </div>

  <div id="result-panel">
    <div class="label">Market Avg ($/ct)</div>
    <div class="value" id="market-avg">—</div>
    <div class="label">Your $/ct vs Market</div>
    <div class="diff" id="price-diff">Enter your stone's details above</div>
    <div id="your-stone-badge" style="display:none">⬤ YOUR STONE shown in white</div>
  </div>
</div>

<div id="canvas-container"></div>
<div id="mobile-result" style="display:none;">
  <span id="mobile-avg"></span> · <span id="mobile-diff"></span>
</div>
<div id="tooltip"></div>
<div id="legend-panel">

data.forEach(d => { d.ppc = d.p / d.ct; });

function setMarket(mode) {
  currentMarket = mode;

// Axis mappings
// X = Colour: H=0, G=1, F=2, E=3
// Y = Price per Carat ($/ct)
// Z = Clarity: VS2=0, VS1=1, VVS2=2, VVS1=3
const colourMap = {H:0, G:1, F:2, E:3};
const clarityMap = {VS2:0, VS1:1, VVS2:2, VVS1:3};

// Cut → point colour
const cutColours = {
  'Excellent': 0x58a6ff,  // blue
  'Very Good': 0xf0883e   // orange
};

// Scale factors
const xScale = 2.5;
const yScale = 8;
const zScale = 2.5;
let minPPC = 1500;
let maxPPC = 5750;

function mapX(colour) { return colourMap[colour] * xScale; }
function mapY(ppc) { return ((ppc - minPPC) / (maxPPC - minPPC)) * yScale; }
function mapZ(clarity) { return clarityMap[clarity] * zScale; }

// THREE setup
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setClearColor(0x0d1117);
container.appendChild(renderer.domElement);

function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); renderer.setPixelRatio(window.devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);
// Retry resize after layout settles on mobile
setTimeout(resize, 100);
setTimeout(resize, 500);

const group = new THREE.Group(), points = [];

// Create market points
data.forEach(d => {
  const x = mapX(d.co);
  const y = mapY(d.ppc * marketMultiplier);
  const z = mapZ(d.cl);
  const sz = 0.08 + (d.ct - 2) * 0.6;
  const geo = new THREE.SphereGeometry(sz, 12, 12);
  const mat = new THREE.MeshPhongMaterial({
    color: cutColours[d.cu],
    transparent: true,
    opacity: 0.8,
    shininess: 60
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    x + (Math.random() - .5) * .3,
    Math.max(0, Math.min(yScale, y)),
    z + (Math.random() - .5) * .3
  );
  mesh.userData = d;
  group.add(mesh);
  points.push(mesh);
});

// Axes
const axMats = {
  x: new THREE.LineBasicMaterial({color: 0xff7b72}),
  y: new THREE.LineBasicMaterial({color: 0x7ee787}),
  z: new THREE.LineBasicMaterial({color: 0x79c0ff})
};
[
  {pts: [[-.5, 0, 0], [3 * xScale + 1, 0, 0]], m: 'x'},
  {pts: [[0, -.3, 0], [0, yScale + .5, 0]], m: 'y'},
  {pts: [[0, 0, -.5], [0, 0, 3 * zScale + 1]], m: 'z'}

  const g = new THREE.BufferGeometry().setFromPoints(a.pts.map(p => new THREE.Vector3(...p)));
  group.add(new THREE.Line(g, axMats[a.m]));
});
group.add(new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(3 * xScale, 0, 0), .8, 0xff7b72, .25, .12));
group.add(new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, yScale, 0), .8, 0x7ee787, .25, .12));

// Grid lines
const gm = new THREE.LineBasicMaterial({color: 0x21262d, transparent: true, opacity: .3});
// X-Z floor grid
for (let i = 0; i <= 3; i++) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(i * xScale, 0, -.2),
    new THREE.Vector3(i * xScale, 0, 3 * zScale + .2)
  ]);
  group.add(new THREE.Line(g, gm));
}
for (let i = 0; i <= 3; i++) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-.2, 0, i * zScale),
    new THREE.Vector3(3 * xScale + .2, 0, i * zScale)
  ]);
  group.add(new THREE.Line(g, gm));
}
// Y-axis grid
for (let i = 0; i <= 4; i++) {
  const y = (i / 4) * yScale;
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-.2, y, 0),
    new THREE.Vector3(3 * xScale + .2, y, 0)
  ]);
  group.add(new THREE.Line(g, gm));
}

// Labels
function lbl(t, pos, sz, col) {
  sz = sz || .35; col = col || '#8b949e';
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const x = c.getContext('2d');
  x.font = 'bold 28px -apple-system,sans-serif';
  x.fillStyle = col; x.textAlign = 'center'; x.fillText(t, 128, 42);
  const tx = new THREE.CanvasTexture(c);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({map: tx, transparent: true}));
  s.position.copy(pos); s.scale.set(sz * 4, sz, 1);
  group.add(s);
  return s;
}

// X-axis labels (Colour)
const axisLabelSprites = []; // {sprite, axis:'x'|'z', value:'H'|'G'|etc}
['H', 'G', 'F', 'E'].forEach((c, i) =>
  axisLabelSprites.push({sprite: lbl(c, new THREE.Vector3(i * xScale, -.7, -.5), .4, '#ff7b72'), axis:'x', value:c})
);

// Y-axis labels ($/ct)
let yLabelSprites = [];
function updateYLabels() {
  // Remove old Y labels
  yLabelSprites.forEach(s => group.remove(s));
  yLabelSprites = [];
  const steps = 5;
  for (let i = 0; i < steps; i++) {
    const v = minPPC + (maxPPC - minPPC) * (i / (steps - 1));
    const y = (i / (steps - 1)) * yScale;
    const s = lbl('$' + (v / 1000).toFixed(1) + 'K', new THREE.Vector3(-1.8, y, -.3), .3, '#7ee787');
    yLabelSprites.push(s);
  }
}
updateYLabels();

// Z-axis labels (Clarity)
['VS2', 'VS1', 'VVS2', 'VVS1'].forEach((cl, i) => {
  axisLabelSprites.push({sprite: lbl(cl, new THREE.Vector3(-1.2, -.6, i * zScale), .35, '#79c0ff'), axis:'z', value:cl});
});

// Axis title labels

lbl('$/CARAT ↑', new THREE.Vector3(-2.6, yScale / 2, 0), .35, '#7ee787');
lbl('CLARITY →', new THREE.Vector3(-1.2, -1.4, 3 * zScale / 2), .35, '#79c0ff');

scene.add(group);
group.position.set(-3 * xScale / 2, -yScale / 2, -3 * zScale / 2);

// Lighting

// YOUR STONE marker
let yourStoneMesh = null;
function updateYourStone() {
  if (yourStoneMesh) { group.remove(yourStoneMesh); yourStoneMesh = null; }
  const co = document.getElementById('inp-colour').value;
  const cl = document.getElementById('inp-clarity').value;
  const cu = document.getElementById('inp-cut').value;
  const pr = parseFloat(document.getElementById('inp-price').value);
  const ct = parseFloat(document.getElementById('inp-carat').value);
  const mobileResult = document.getElementById('mobile-result');
  if (!pr || !ct) {
    mobileResult.style.display = 'none';
    return;
  }
  if (!co || !cl) { mobileResult.style.display = 'none'; return; }

  const ppc = pr / ct;
  const x = mapX(co);
  const y = mapY(ppc);
  const z = mapZ(cl);

  const geo = new THREE.SphereGeometry(.22, 16, 16);
  const mat = new THREE.MeshPhongMaterial({color: 0xffffff, emissive: 0x666666, shininess: 100});
  yourStoneMesh = new THREE.Mesh(geo, mat);
  yourStoneMesh.position.set(x, Math.max(0, Math.min(yScale, y)), z);
  // Ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(.38, .04, 8, 32),
    new THREE.MeshBasicMaterial({color: 0xffffff})
  );
  ring.rotation.x = Math.PI / 2;
  yourStoneMesh.add(ring);
  group.add(yourStoneMesh);
  document.getElementById('your-stone-badge').style.display = 'inline-block';

  // Market average
  let matches = data.filter(d => d.co === co && d.cl === cl);
  if (cu) matches = matches.filter(d => d.cu === cu);
  if (!matches.length) matches = data.filter(d => d.co === co && d.cl === cl);
  if (!matches.length) matches = data.filter(d => d.co === co);
  if (!matches.length) matches = data;

  const avgPPC = Math.round(matches.reduce((s, d) => s + d.ppc * marketMultiplier, 0) / matches.length);
  document.getElementById('market-avg').textContent = '$' + avgPPC.toLocaleString() + '/ct';

  const diff = ppc - avgPPC;
  const pct = ((diff / avgPPC) * 100).toFixed(1);
  const el = document.getElementById('price-diff');
  let diffHtml = '';
  if (diff < -200) {
    diffHtml = `<span class="diff-below">✅ $${Math.abs(Math.round(diff)).toLocaleString()}/ct below (${pct}%)</span>`;
  } else if (diff <= 200) {
    diffHtml = `<span class="diff-fair">≈ Fair price</span>`;
  } else {
    diffHtml = `<span class="diff-above">⚠️ $${Math.round(diff).toLocaleString()}/ct above (+${pct}%)</span>`;
  }
  el.innerHTML = diffHtml;
  // Update mobile banner
  document.getElementById('mobile-avg').textContent = 'Avg: $' + avgPPC.toLocaleString() + '/ct';
  document.getElementById('mobile-diff').innerHTML = diffHtml;
  mobileResult.style.display = 'block';
}

['inp-price', 'inp-colour', 'inp-clarity', 'inp-cut', 'inp-carat'].forEach(id => {
  document.getElementById(id).addEventListener('change', updateYourStone);
  document.getElementById(id).addEventListener('input', updateYourStone);
});

// Camera orbit
let isDrag = false, pX = 0, pY = 0, rotY = -.5, rotX = .35, zoom = 16;
renderer.domElement.addEventListener('mousedown', e => { isDrag = true; pX = e.clientX; pY = e.clientY; });
renderer.domElement.addEventListener('mousemove', e => {
  if (isDrag) {
    rotY += (e.clientX - pX) * .005;
    rotX += (e.clientY - pY) * .005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    pX = e.clientX; pY = e.clientY;
  }
});
renderer.domElement.addEventListener('mouseup', () => isDrag = false);
renderer.domElement.addEventListener('mouseleave', () => isDrag = false);
renderer.domElement.addEventListener('wheel', e => { zoom += e.deltaY * .01; zoom = Math.max(6, Math.min(30, zoom)); });

// Touch support for mobile
let lastTouchX = 0, lastTouchY = 0, lastPinchDist = 0, touchStartX = 0, touchStartY = 0, touchMoved = false;
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    touchStartX = lastTouchX;
    touchStartY = lastTouchY;
    touchMoved = false;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
  }
}, {passive: false});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    rotY += (e.touches[0].clientX - lastTouchX) * .005;
    rotX += (e.touches[0].clientY - lastTouchY) * .005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    const dx = lastTouchX - touchStartX, dy = lastTouchY - touchStartY;
    if (Math.sqrt(dx*dx + dy*dy) > 10) touchMoved = true;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    zoom += (lastPinchDist - dist) * .03;
    zoom = Math.max(6, Math.min(30, zoom));
    lastPinchDist = dist;
  }
}, {passive: false});

// Tooltip
const rc = new THREE.Raycaster(), mouse = new THREE.Vector2(), tip = document.getElementById('tooltip');
let hov = null;
renderer.domElement.addEventListener('mousemove', e => {
  if (isDrag) { tip.style.display = 'none'; return; }
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  rc.setFromCamera(mouse, camera);
  const hits = rc.intersectObjects(points);
  if (hits.length > 0) {
    const d = hits[0].object.userData;
    if (hov) hov.material.emissive.setHex(0);
    hov = hits[0].object; hov.material.emissive.setHex(0x444444);
    const adjP = Math.round(d.p * marketMultiplier);
    const adjPPC = Math.round(d.ppc * marketMultiplier);
    tip.innerHTML = `<div class="price">$${adjP.toLocaleString()} &nbsp;<span style="font-size:11px;color:#8b949e;">($${adjPPC.toLocaleString()}/ct)</span></div>
      ${d.ct}ct · ${d.co} · ${d.cl} · ${d.cu}<br>
      <span style="color:#8b949e">${d.s === 'BN' ? 'Blue Nile' : 'StoneAlgo'} · ${currentMarket}</span>`;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 16) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  } else {
    if (hov) hov.material.emissive.setHex(0);
    hov = null; tip.style.display = 'none';
  }
});

// Mobile: tap axis labels to toggle bounding boxes
renderer.domElement.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  if (touchMoved) return; // ignore drags
  const touch = e.changedTouches[0];
  const rect = renderer.domElement.getBoundingClientRect();
  labelMouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
  labelMouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
  labelRc.setFromCamera(labelMouse, camera);
  const sprites = axisLabelSprites.map(a => a.sprite);
  const hits = labelRc.intersectObjects(sprites);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const entry = axisLabelSprites.find(a => a.sprite === hit);
    if (entry) {
      const idx = lockedFilters.findIndex(f => f.axis === entry.axis && f.value === entry.value);
      if (idx >= 0) {
        lockedFilters.splice(idx, 1);
      } else {
        lockedFilters.push({axis: entry.axis, value: entry.value});
      }
      rebuildHighlights();
    }
  } else if (lockedFilters.length > 0) {
    lockedFilters = [];
    rebuildHighlights();
  }
});

// Animation
// --- Axis hover highlight system ---
let highlightBoxes = []; // array of {mesh, axis, value}
let lockedFilters = []; // array of {axis, value}
let hoverFilter = null; // {axis, value} or null

function rebuildHighlights() {
  // Remove all existing boxes
  highlightBoxes.forEach(b => group.remove(b.mesh));
  highlightBoxes = [];

  // Combine locked filters + hover (if not already locked)
  const activeFilters = [...lockedFilters];
  if (hoverFilter && !lockedFilters.some(f => f.axis === hoverFilter.axis && f.value === hoverFilter.value)) {
    activeFilters.push(hoverFilter);
  }

  if (activeFilters.length === 0) {
    points.forEach(m => { m.material.opacity = 0.8; });
    return;
  }

  // A point is "inside" if it matches ANY active filter
  // A point is "inside" if it matches ANY active filter
  // A point is in the "intersection" if it matches ALL active filters
  points.forEach(m => {
    const d = m.userData;
    const matchAny = activeFilters.some(f =>
      (f.axis === 'x') ? (d.co === f.value) : (d.cl === f.value)
    );
    const matchAll = activeFilters.every(f =>
      (f.axis === 'x') ? (d.co === f.value) : (d.cl === f.value)
    );
    m.material.opacity = matchAll ? 1.0 : (matchAny ? 0.4 : 0.08);
  });

  // Create a bounding box for each active filter
  activeFilters.forEach(f => {
    let minV = new THREE.Vector3(Infinity, Infinity, Infinity);
    let maxV = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
    points.forEach(m => {
      const d = m.userData;
      const match = (f.axis === 'x') ? (d.co === f.value) : (d.cl === f.value);
      if (match) { minV.min(m.position); maxV.max(m.position); }
    });
    const pad = 0.4;
    minV.addScalar(-pad); maxV.addScalar(pad);
    const size = new THREE.Vector3().subVectors(maxV, minV);
    const center = new THREE.Vector3().addVectors(minV, maxV).multiplyScalar(0.5);
    const boxGeo = new THREE.BoxGeometry(size.x, size.y, size.z);
    const edges = new THREE.EdgesGeometry(boxGeo);
    const isLocked = lockedFilters.some(lf => lf.axis === f.axis && lf.value === f.value);
    const boxMat = new THREE.LineBasicMaterial({color: isLocked ? 0x58a6ff : 0x8b949e, transparent: true, opacity: isLocked ? 0.7 : 0.4});
    const mesh = new THREE.LineSegments(edges, boxMat);
    mesh.position.copy(center);
    group.add(mesh);
    highlightBoxes.push({mesh, axis: f.axis, value: f.value});
  });

  // If 2+ filters active, compute and show the intersection box
  if (activeFilters.length >= 2) {
    let intMinV = new THREE.Vector3(Infinity, Infinity, Infinity);
    let intMaxV = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
    let hasIntersection = false;
    points.forEach(m => {
      const d = m.userData;
      const matchAll = activeFilters.every(f =>
        (f.axis === 'x') ? (d.co === f.value) : (d.cl === f.value)
      );
      if (matchAll) {
        intMinV.min(m.position);
        intMaxV.max(m.position);
        hasIntersection = true;
      }
    });
    if (hasIntersection) {
      const pad = 0.3;
      intMinV.addScalar(-pad); intMaxV.addScalar(pad);
      const size = new THREE.Vector3().subVectors(intMaxV, intMinV);
      const center = new THREE.Vector3().addVectors(intMinV, intMaxV).multiplyScalar(0.5);
      const boxGeo = new THREE.BoxGeometry(size.x, size.y, size.z);
      const edges = new THREE.EdgesGeometry(boxGeo);
      const boxMat = new THREE.LineBasicMaterial({color: 0x3fb950, transparent: true, opacity: 0.9, linewidth: 2});
      const mesh = new THREE.LineSegments(edges, boxMat);
      mesh.position.copy(center);
      group.add(mesh);
      highlightBoxes.push({mesh, axis: 'intersection', value: 'all'});
    }
  }
}

// Raycast against axis label sprites
const labelRc = new THREE.Raycaster();
const labelMouse = new THREE.Vector2();
let lastHitLabel = null;
renderer.domElement.addEventListener('mousemove', e => {
  if (isDrag) return;
  const rect = renderer.domElement.getBoundingClientRect();
  labelMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  labelMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  labelRc.setFromCamera(labelMouse, camera);
  const sprites = axisLabelSprites.map(a => a.sprite);
  const hits = labelRc.intersectObjects(sprites);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const entry = axisLabelSprites.find(a => a.sprite === hit);
    if (entry && (lastHitLabel !== entry)) {
      lastHitLabel = entry;
      hoverFilter = {axis: entry.axis, value: entry.value};
      rebuildHighlights();
    }
  } else if (lastHitLabel) {
    lastHitLabel = null;
    hoverFilter = null;
    rebuildHighlights();
  }
});

// Click to lock/unlock axis highlight
renderer.domElement.addEventListener('click', e => {
  const rect = renderer.domElement.getBoundingClientRect();
  labelMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  labelMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  labelRc.setFromCamera(labelMouse, camera);
  const sprites = axisLabelSprites.map(a => a.sprite);
  const hits = labelRc.intersectObjects(sprites);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const entry = axisLabelSprites.find(a => a.sprite === hit);
    if (entry) {
      // Toggle: if already locked, remove it; otherwise add it
      const idx = lockedFilters.findIndex(f => f.axis === entry.axis && f.value === entry.value);
      if (idx >= 0) {
        lockedFilters.splice(idx, 1);
      } else {
        lockedFilters.push({axis: entry.axis, value: entry.value});
      }
      rebuildHighlights();
    }
  } else if (lockedFilters.length > 0) {
    // Click empty space = clear all locks
    lockedFilters = [];
    rebuildHighlights();
  }
});

function animate() {
  requestAnimationFrame(animate);
  camera.position.x = Math.sin(rotY) * zoom;
  camera.position.z = Math.cos(rotY) * zoom;
  camera.position.y = Math.sin(rotX) * zoom * .5 + 3;
  camera.lookAt(0, yScale * .15, 0);
  // Pulse your stone
  if (yourStoneMesh) {
    const s = 1 + Math.sin(Date.now() * .003) * .15;
    yourStoneMesh.scale.set(s, s, s);
  }
  renderer.render(scene, camera);
}
animate();
</script>
